<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <!-- Perfectly smooth global gradient -->
    <linearGradient id="brand" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <!-- Flawless geometric mask -->
    <mask id="tech-cuts">
      <rect x="0" y="0" width="100" height="100" fill="white" />
      
      <!-- Parallel slice down the left leg (extended to y=100 to prevent bottom artifacts) -->
      <line x1="57.5" y1="0" x2="7.5" y2="100" stroke="black" stroke-width="2.5" />
      
      <!-- Horizontal crossbar stencils (safely away from right leg) -->
      <line x1="0" y1="61" x2="59" y2="61" stroke="black" stroke-width="1.5" />
      <line x1="0" y1="65" x2="61" y2="65" stroke="black" stroke-width="1.5" />
    </mask>
  </defs>

  <circle cx="50" cy="50" r="48" fill="#050508"/>
  
  <!-- Mathematically exact solid path shifted UP by 4 units for optical centering -->
  <!-- Integrated a vertical chamfer on the left foot (19 81 to 19 73) -->
  <path d="M 47.5 16 
           L 52.5 16 
           L 85 81 
           L 71 81 
           L 64.5 68 
           L 35.5 68 
           L 29 81 
           L 19 81 
           L 19 73 Z 
           M 50 39 
           L 40.5 58 
           L 59.5 58 Z" 
        fill="url(#brand)" 
        mask="url(#tech-cuts)" />
</svg>
